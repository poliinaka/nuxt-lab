services:
  postgres:
    image: postgres:16
    container_name: postgres-nuxt
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nuxtlab
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: nuxt-app
    restart: always
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/nuxtlab?schema=public"
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node .output/server/index.mjs"

  nginx:
    image: nginx:alpine
    container_name: nuxt-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  postgres_data: